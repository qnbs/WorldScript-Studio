<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Manifest & Icons ───────────────────────────────── -->
    <link rel="manifest" href="/StoryCraft-Studio/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/StoryCraft-Studio/favicon.svg" />
    <link rel="apple-touch-icon" href="/StoryCraft-Studio/favicon.svg" />

    <!-- ── Viewport & Theme ──────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />

    <!-- ── SEO & Social ───────────────────────────────────── -->
    <meta name="description" content="AI-Powered Creative Writing Studio — craft entire novels, characters & worlds with Gemini AI. Works offline." />
    <meta name="keywords" content="creative writing, AI writing assistant, novel writer, story generator, character builder, world building" />
    <meta name="author" content="StoryCraft Studio" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="StoryCraft Studio" />
    <meta property="og:title"       content="StoryCraft Studio — AI Creative Writing" />
    <meta property="og:description" content="Craft entire novels, characters & worlds with Gemini AI. Works offline as a PWA." />
    <meta property="og:url"         content="https://storycraft-studio.app/StoryCraft-Studio/" />
    <meta property="og:image"       content="/StoryCraft-Studio/favicon.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="StoryCraft Studio" />
    <meta name="twitter:description" content="AI-Powered Creative Writing Studio — Gemini AI, offline-ready PWA." />
    <meta name="twitter:image"       content="/StoryCraft-Studio/favicon.svg" />

    <!-- ── PWA / Mobile Capable ──────────────────────────── -->
    <meta name="mobile-web-app-capable"            content="yes" />
    <meta name="apple-mobile-web-app-capable"      content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"        content="StoryCraft" />
    <meta name="msapplication-TileColor"           content="#020617" />
    <meta name="msapplication-tap-highlight"       content="no" />
    <meta name="application-name"                  content="StoryCraft Studio" />

    <!-- ── Security: Content Security Policy ─────────────── -->
    <!--
      CSP-Strategie:
      - script-src: nur eigene Skripte (Vite ES modules, kein inline nötig)
      - style-src: eigene + unsafe-inline (React inline-styles)
      - font-src: self only (fonts self-hosted via @fontsource)
      - connect-src: Gemini API + OpenAI API + Collaboration WebSocket endpoints
      - img-src: data: URLs für Base64-Bilder erlaubt
      - Produktions-CSP wird über HTTP-Header des Hosts verschärft
    -->
    <meta http-equiv="Content-Security-Policy"
          content="
            default-src 'self';
            script-src  'self';
            style-src   'self' 'unsafe-inline';
            font-src    'self' data:;
            img-src     'self' data: blob:;
            connect-src 'self' https://generativelanguage.googleapis.com https://api.openai.com wss://y-webrtc-signaling.fly.dev wss://signaling.yjs.dev wss://*.workers.dev wss: ws:;
            worker-src  'self' blob:;
            manifest-src 'self';
            object-src  'none';
            base-uri    'self';
            form-action 'self';
            frame-ancestors 'none';
            upgrade-insecure-requests;
          " />

    <title>StoryCraft Studio</title>
</head>
  <body>
    <!-- QNBS-v3: Disable Aurora on low-end hardware (≤4 logical CPUs) to prevent GPU/battery drain; prefers-reduced-data handled in CSS. -->
    <script>if(navigator.hardwareConcurrency<=4)document.documentElement.classList.add('aurora-disabled');</script>
    <div class="noise-overlay"></div>
    <div class="aurora-container">
      <div class="aurora-blob blob-1"></div>
      <div class="aurora-blob blob-2"></div>
      <div class="aurora-blob blob-3"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
