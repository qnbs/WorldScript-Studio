# Cloudflare Pages — StoryCraft Studio (static SPA)
# https://developers.cloudflare.com/pages/
#
# Dashboard (Builds):
#   Build command:     pnpm install && pnpm run build:edge
#   Build output dir:  dist
#   Deploy command:    LEER (empfohlen) — Cloudflare publiziert dist automatisch
#                      oder: pnpm run deploy:cloudflare (No-Op wenn CF_PAGES=1)
#   NICHT:             npx wrangler deploy | wrangler pages deploy in CI-Deploy-Step
#   NICHT nötig:       CLOUDFLARE_API_TOKEN in Pages-Build-Env (nur für manuelles GH-Deploy)
#
name = "storycraft-studio"
compatibility_date = "2026-05-31"
pages_build_output_dir = "dist"
