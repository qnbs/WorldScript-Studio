services:
  storycraft:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    image: storycraft-studio:latest
    container_name: storycraft-studio
    ports:
      - "3000:3000"
      - "4173:4173"
      - "6006:6006"
    environment:
      - NODE_OPTIONS=--max-old-space-size=8192
      - CI=true
      - PLAYWRIGHT_BROWSERS_PATH=/usr/local/playwright
      - VITEST_MAX_WORKERS=1
    volumes:
      - storycraft-pnpm-store:/home/vscode/.local/share/pnpm/store
      - storycraft-cargo-cache:/usr/local/cargo/registry
      - storycraft-rustup-cache:/usr/local/rustup
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  storycraft-pnpm-store:
  storycraft-cargo-cache:
  storycraft-rustup-cache:
