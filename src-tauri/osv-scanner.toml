# osv-scanner ignore list for src-tauri/Cargo.lock
# All entries have been evaluated and accepted by the maintainer.
# Reviewed: 2026-05-17

# ─── GTK3 Rust bindings (Linux WebKit stack) ────────────────────────────────
# webkit2gtk 2.0.2 (required by wry 0.55.x / Tauri 2.x for Linux) depends on
# the 0.18.x series of GTK3 Rust bindings. These crates are marked "unmaintained"
# in the advisory DB because they were superseded by the gtk4 crate series.
# No patched 0.18.x version exists and upgrading to 0.19+ would require a major
# breaking change in Tauri's Linux WebView stack (webkit2gtk → webkit2gtk-4.1).
# These crates only affect Linux desktop builds; the PWA is unaffected.

[[IgnoredVulns]]
id = "RUSTSEC-2024-0411"
ignoreUntil = "2026-11-30T00:00:00Z"
reason = "gdkwayland-sys 0.18.x: unmaintained GTK3 Wayland sys binding; no fix available without upgrading WebKit stack on Linux"

[[IgnoredVulns]]
id = "RUSTSEC-2024-0412"
ignoreUntil = "2026-11-30T00:00:00Z"
