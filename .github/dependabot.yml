version: 2
updates:
  # npm / pnpm workspaces
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    # QNBS-v3: cooldown delays Dependabot PRs until a release has aged 7 days — matched to the
    # .npmrc `minimum-release-age=10080` (7-day) supply-chain policy, so a freshly-published
    # version is never PR'd before `pnpm install --frozen-lockfile` would accept it (avoids
    # ERR_PNPM_MINIMUM_RELEASE_AGE_VIOLATION CI failures like #154/#155). The .npmrc gate is
    # install-time only; this cooldown is the PR-creation-time counterpart.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      # QNBS-v3: react and react-dom must stay in lockstep; split bumps cause version-mismatch errors at test time.
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      # Group dev-tooling updates together to reduce PR noise
      dev-tooling:
        patterns:
          - 'vitest*'
          - '@vitest/*'
          - 'playwright*'
          - '@playwright/*'
          - 'storybook*'
          - '@storybook/*'
          - 'biome*'
          - 'stryker*'
          - '@stryker-mutator/*'

  # Cargo / Rust (Tauri desktop backend)
  # QNBS-v3: separate from npm — Cargo updates affect src-tauri/ only; group all together to reduce PR noise
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      tauri-deps:
        patterns:
          - 'tauri*'
          - 'tauri-*'
          - 'wry'
          - 'tao'

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
