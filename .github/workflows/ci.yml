# ============================================================
# StoryCraft Studio – CI/CD Pipeline
# security → quality (lint, i18n, tsc, vitest+coverage) → build (+chunk budget, rollup analyze)
#   ├→ e2e | storybook (parallel) ; lighthouse after build
# deploy (main): needs build + e2e → GitHub Pages
# ============================================================

name: CI / CD

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# QNBS-v3: cancel-in-progress only on PRs — cancelling a main-branch deploy mid-flight causes rollback confusion
concurrency:
  group: >-
    ci-${{ github.workflow }}-${{
      github.event_name == 'pull_request' && github.head_ref || github.ref_name
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ----------------------------------------------------------
  # 0. SECURITY: pnpm audit + gitleaks + dependency review
  # ----------------------------------------------------------
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # QNBS-v3: dependency-review-action braucht PR-Metadaten lesbar — sonst schlägt der Job bei externen PRs/Scopes unnötig fehl.
    permissions:
      contents: read
      pull-requests: read
    steps:
      # QNBS-v3: fetch-depth:0 gives gitleaks access to parent commits (sha^) needed for PR diff scans; shallow clone causes "ambiguous argument" errors.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: pnpm audit (high + critical)
        run: pnpm audit --audit-level=high

      # QNBS-v3: osv-scanner.toml (in src-tauri/) suppresses accepted RUSTSEC advisories for Cargo.lock;
      # scan both lockfiles so npm + Rust advisories are caught on every push
      - name: OSV vulnerability scan
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --config=src-tauri/osv-scanner.toml
            --lockfile=pnpm-lock.yaml
            --lockfile=src-tauri/Cargo.lock

      # QNBS-v3: gitleaks scans git history for secrets; GITHUB_TOKEN is enough for PR annotations.
      - name: Scan for leaked secrets (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency review (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5

  # ----------------------------------------------------------
  # 1. QUALITY GATE: Lint + Typecheck + Tests (parallel matrix)
  # ----------------------------------------------------------
  quality:
    name: 🔍 Quality Gate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [security]
    strategy:
      fail-fast: false
      matrix:
        # QNBS-v3: YAML-sicher quotiert — gleicher String wie in expressions für Codecov/Artifacts.
        node-version: ['lts/*', 'node']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}

      - name: Lint (Biome)
        run: pnpm run lint

      - name: i18n key parity (vs en)
        run: pnpm run i18n:check

      - name: Typecheck (tsc)
        run: pnpm run typecheck

      - name: Unit tests (Vitest)
        run: pnpm exec vitest run --coverage

      - name: Upload coverage report
        # QNBS-v3: Matrix-Wert bleibt Literal 'lts/*' — ein Upload pro Workflow reicht (Codecov optional).
        if: always() && matrix.node-version == 'lts/*'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 7

      # QNBS-v3: fail_ci_if_error: false — Forks ohne CODECOV_TOKEN; Coverage bleibt trotzdem im Artifact.
      - name: Publish coverage to Codecov
        if: always() && matrix.node-version == 'lts/*'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

  # ----------------------------------------------------------
  # 2. MUTATION: Stryker (informational, does not gate deploy)
  # ----------------------------------------------------------
  mutation:
    name: 🧬 Mutation Tests (Stryker)
    runs-on: ubuntu-latest
    # QNBS-v3: 30 min — 9 files × timeoutMS:120s × concurrency:2; raised from 20 to avoid premature job kill
    timeout-minutes: 30
    needs: [quality]
    # QNBS-v3: informational only — break:null in stryker.conf.json; baseline TBD before enforcing a hard gate
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup

      - name: Run Stryker if configured
        run: |
          if [ -f "stryker.config.json" ] || [ -f "stryker.conf.json" ]; then
            pnpm run mutation
          else
            echo "No Stryker config found, skipping mutation testing."
          fi

  # ----------------------------------------------------------
  # 3. BUILD: Production build + Pages artifact upload
  # ----------------------------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    # QNBS-v3: attestations + id-token needed for SLSA build provenance on main.
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup

      - name: Build application
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Bundle chunk size budget
        run: pnpm run bundle:budget

      - name: Bundle analysis (rollup visualizer)
        run: pnpm run analyze
        env:
          NODE_ENV: production

      - name: Upload bundle analysis HTML
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-analysis
          path: dist/bundle-analysis.html
          retention-days: 14

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: ./dist
          # QNBS-v3: 3 days — dist is only needed by lighthouse + deploy jobs in the same run
          retention-days: 3

      # QNBS-v3: SLSA provenance attestation — ties the dist artifact to this exact
      # workflow run and commit SHA; verifiable with `gh attestation verify`.
      - name: Attest build provenance
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ./dist

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  # ----------------------------------------------------------
  # 4. DEPLOY: GitHub Pages (only on main push)
  # ----------------------------------------------------------
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  # ----------------------------------------------------------
  # 5. E2E: Playwright (after quality gate, parallel with build)
  # ----------------------------------------------------------
  e2e:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # QNBS-v3: 29 tests × 2 browser-projects × retries:2 sequential → can exceed 30 min; raised to 50.
    timeout-minutes: 50
    needs: [quality]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup

      # QNBS-v3: cache Playwright browsers by version so re-runs don't re-download ~400 MB each time.
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: tests/e2e/html-report/
          if-no-files-found: warn
          retention-days: 7

      # QNBS-v3: JUnit output from playwright.config.ts reporter — enables per-test annotation in GitHub PR checks
      - name: Upload E2E JUnit results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-junit
          path: tests/e2e/results/junit.xml
          if-no-files-found: warn
          retention-days: 7

  # ----------------------------------------------------------
  # 6. LIGHTHOUSE: Performance budgets (after build)
  # ----------------------------------------------------------
  lighthouse:
    name: 🔦 Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    continue-on-error: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: ./dist

      # QNBS-v3: no --assert.exitCode flag — let .lighthouserc.cjs assertions drive the
      # exit code; error-level assertions (CLS, accessibility) will correctly fail this job.
      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-report
          path: .lighthouseci/
          if-no-files-found: warn
          # QNBS-v3: align with other report artifacts (7 days); 14 was inconsistent
          retention-days: 7

  # ----------------------------------------------------------
  # 7. STORYBOOK: Build + artifact (parallel with build)
  # ----------------------------------------------------------
  storybook:
    name: 📖 Storybook
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup

      - name: Build Storybook
        run: pnpm exec storybook build --output-dir storybook-static

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: storybook
          path: storybook-static/
          # QNBS-v3: align with other report artifacts (7 days); 14 was inconsistent
          retention-days: 7
