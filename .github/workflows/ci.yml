# ============================================================
# StoryCraft Studio – CI/CD Pipeline
# security → quality (lint, i18n, tsc, vitest+coverage) → build (+chunk budget, rollup analyze)
#   ├→ e2e | storybook (parallel) ; lighthouse after build
# deploy (main): needs build + e2e → GitHub Pages
# ============================================================

name: CI / CD

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------
  # 0. SECURITY: pnpm audit + dependency review
  # ----------------------------------------------------------
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high + critical)
        run: pnpm audit --audit-level=high

      - name: Dependency review (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

  # ----------------------------------------------------------
  # 1. QUALITY GATE: Lint + Typecheck + Tests (parallel matrix)
  # ----------------------------------------------------------
  quality:
    name: 🔍 Quality Gate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [security]
    strategy:
      fail-fast: false
      matrix:
        node-version: [lts/*, node]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm run lint

      - name: i18n key parity (vs en)
        run: pnpm run i18n:check

      - name: Typecheck (tsc)
        run: pnpm run typecheck

      - name: Unit tests (Vitest)
        run: pnpm exec vitest run --coverage

      - name: Upload coverage report
        if: always() && matrix.node-version == 'lts/*'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Publish coverage to Codecov
        if: always() && matrix.node-version == 'lts/*'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

  # ----------------------------------------------------------
  # 2. BUILD: Production build + Pages artifact upload
  # ----------------------------------------------------------
  mutation:
    name: 🧬 Mutation Tests (Stryker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Stryker if configured
        run: |
          if [ -f "stryker.config.json" ] || [ -f "stryker.conf.json" ]; then
            pnpm run mutation
          else
            echo "No Stryker config found, skipping mutation testing."
          fi

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Bundle chunk size budget
        run: pnpm run bundle:budget

      - name: Bundle analysis (rollup visualizer)
        run: pnpm run analyze
        env:
          NODE_ENV: production

      - name: Upload bundle analysis HTML
        uses: actions/upload-artifact@v6
        with:
          name: bundle-analysis
          path: dist/bundle-analysis.html
          retention-days: 14

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: ./dist
          retention-days: 7

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ----------------------------------------------------------
  # 3. DEPLOY: GitHub Pages (only on main push)
  # ----------------------------------------------------------
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ----------------------------------------------------------
  # 3b. E2E: Playwright (after quality gate, parallel with build)
  # ----------------------------------------------------------
  e2e:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: tests/e2e/html-report/
          retention-days: 7

  # ----------------------------------------------------------
  # 4. LIGHTHOUSE: Performance budgets (after build)
  # ----------------------------------------------------------
  lighthouse:
    name: 🔦 Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    continue-on-error: false
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: ./dist

      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun --assert.exitCode=0
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14

  # ----------------------------------------------------------
  # 5. STORYBOOK: Build + artifact (parallel with build)
  # ----------------------------------------------------------
  storybook:
    name: 📖 Storybook
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm exec storybook build --output-dir storybook-static

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v6
        with:
          name: storybook
          path: storybook-static/
          retention-days: 14
