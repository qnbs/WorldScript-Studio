# Desktop bundles — manual or tagged releases (does not block web CI).
# Produces installable artifacts per OS under Actions → workflow run → Artifacts.

name: Tauri desktop build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: tauri-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    name: Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: windows-latest
          - os: macos-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # QNBS-v3: composite action handles pnpm/node setup + frozen install.
      - uses: ./.github/actions/setup

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          cache-all-crates: true
          # QNBS-v3: bump prefix-key when changing Rust channel or after major Cargo.lock churn
          prefix-key: "v1"

      - name: Install Linux dependencies (WebKitGTK)
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm exec tauri build

      - name: Upload bundle directory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tauri-bundle-${{ matrix.os }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: warn
          retention-days: 14

  # -----------------------------------------------------------------
  # GitHub Release: attach Linux / Windows / macOS installers (tags v* only)
  # -----------------------------------------------------------------
  release:
    name: GitHub Release
    needs: [bundle]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Download all bundle artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: tauri-bundle-*
          path: downloaded
          merge-multiple: true

      - name: Collect release assets
        id: collect
        run: |
          mkdir -p release-assets
          find downloaded -type f \( \
            -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' \
            -o -name '*.msi' -o -name '*.exe' \
            -o -name '*.dmg' \
            \) -exec cp {} release-assets/ \;
          echo "Files to upload:" && ls -la release-assets/ || true
          if [ -z "$(ls -A release-assets 2>/dev/null)" ]; then
            echo "has_assets=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No bundle files found to attach. Check Tauri bundle output paths."
          else
            echo "has_assets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.collect.outputs.has_assets == 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json for auto-updater
        if: steps.collect.outputs.has_assets == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # QNBS-v3: Tauri v2 update manifest — collect .sig files from signed bundles.
          VERSION="${GITHUB_REF_NAME}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          LINUX_URL="" LINUX_SIG="" WIN_URL="" WIN_SIG="" MAC_URL="" MAC_SIG=""

          for SIG_FILE in release-assets/*.sig; do
            [ -f "$SIG_FILE" ] || continue
            BASE="${SIG_FILE%.sig}"
            FNAME="$(basename "$BASE")"
            SIG_CONTENT="$(cat "$SIG_FILE")"
            case "$FNAME" in
              *.AppImage)          LINUX_URL="${REPO_URL}/${FNAME}"; LINUX_SIG="$SIG_CONTENT" ;;
              *.msi|*-setup.exe)   WIN_URL="${REPO_URL}/${FNAME}";   WIN_SIG="$SIG_CONTENT"   ;;
              *.dmg)               MAC_URL="${REPO_URL}/${FNAME}";   MAC_SIG="$SIG_CONTENT"   ;;
            esac
          done

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg linux_url "$LINUX_URL" --arg linux_sig "$LINUX_SIG" \
            --arg win_url "$WIN_URL"     --arg win_sig "$WIN_SIG" \
            --arg mac_url "$MAC_URL"     --arg mac_sig "$MAC_SIG" \
            '{version:$version, notes:"See release notes", pub_date:$pub_date,
              platforms:({}
                | if $linux_sig!="" then .+{"linux-x86_64":{signature:$linux_sig,url:$linux_url}} else . end
                | if $win_sig!=""   then .+{"windows-x86_64":{signature:$win_sig,url:$win_url}}   else . end
                | if $mac_sig!=""   then .+{"darwin-x86_64":{signature:$mac_sig,url:$mac_url}}     else . end)}' \
            > latest.json

          echo "Generated latest.json:"
          cat latest.json
          gh release upload "$VERSION" latest.json --clobber
