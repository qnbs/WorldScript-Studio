# ============================================================
# StoryCraft Studio – Standalone Mutation Testing (Cloud-First)
# Runs weekly (Monday 03:00 UTC) and on manual dispatch.
# Cloud run uses concurrency:6 + TypeScript-Checker for full
# power; local run stays at concurrency:2 (Low-End friendly).
# Does NOT gate the main CI pipeline — informational only until
# a stable baseline score is established via this workflow.
# ============================================================

name: 🧬 Mutation Tests (Stryker)

on:
  workflow_dispatch:
    inputs:
      break_threshold:
        description: 'Mutation score break threshold (0 = disabled)'
        required: false
        default: '0'
  schedule:
    # QNBS-v3: weekly Monday 03:00 UTC — off-hours to avoid runner contention
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  stryker:
    name: 🧬 Stryker Mutation Report
    runs-on: ubuntu-latest
    # QNBS-v3: Cloud-First: concurrency:6 + TypeScript-Checker; 35 min covers full mutant set
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup

      - name: Run Stryker mutation tests (Cloud – concurrency 6)
        # QNBS-v3: --force clears incremental cache on CI; --concurrency 6 uses ubuntu-latest cores
        run: |
          pnpm exec stryker run \
            --force \
            --concurrency 6 \
            --reporters progress,clear-text,html,json
        env:
          # QNBS-v3: optional Dashboard reporter — only active if secret is set
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

      - name: Upload Stryker HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stryker-report
          path: reports/mutation/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Stryker JSON report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stryker-report-json
          path: reports/mutation/mutation.json
          if-no-files-found: warn
          retention-days: 30
