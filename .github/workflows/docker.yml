# Docker image build + push to GitHub Container Registry on every tag.
# Pull with: docker pull ghcr.io/qnbs/storycraft-studio:latest

name: Docker

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# QNBS-v3: top-level read-only follows principle of least privilege (CodeQL Token-Permissions).
permissions:
  contents: read

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # QNBS-v3: packages:write scoped to this job only — prevents privilege escalation in future jobs.
    permissions:
      contents: read
      packages: write
    steps:
      # QNBS-v3: SHA-pinned to prevent supply-chain attacks via mutable tags
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
