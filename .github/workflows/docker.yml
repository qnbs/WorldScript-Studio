# Docker image build + push to GitHub Container Registry on every tag.
# Pull with: docker pull ghcr.io/qnbs/storycraft-studio:latest

name: Docker

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# QNBS-v3: top-level read-only follows principle of least privilege (CodeQL Token-Permissions).
permissions:
  contents: read

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # QNBS-v3: packages:write scoped to this job only — prevents privilege escalation in future jobs.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aebb5d836f01e7fa4f4 # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a09d4a98e5a5b78f5bd8c96 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
