name: Setup Node + pnpm
description: >
  Checkout, configure pnpm, setup Node (from .nvmrc or explicit version), install
  frozen dependencies. Centralises the repeated 4-step block used by every CI job.

inputs:
  node-version-file:
    description: Path to version file (.nvmrc) — used when node-version is empty
    default: '.nvmrc'
  node-version:
    description: >
      Explicit Node version string (e.g. 'lts/*', 'node', '22'). When non-empty,
      takes precedence over node-version-file. Leave blank for most jobs.
    default: ''

runs:
  using: composite
  steps:
    # QNBS-v3: corepack enable ensures pnpm is available even if the runner has a different default.
    # Node 24+ changed corepack behavior; explicit enable prevents "pnpm: command not found" errors.
    - name: Enable corepack
      shell: bash
      run: corepack enable

    - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

    # QNBS-v3: When node-version is set (matrix), use it; otherwise read .nvmrc so
    # non-matrix jobs stay pinned to the project's declared Node version.
    # Node 24 compatibility: actions/setup-node v6.4.0 handles both LTS versions correctly.
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version == '' && inputs.node-version-file || '' }}
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
