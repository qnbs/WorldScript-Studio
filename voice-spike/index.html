<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Spike Test</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        button { padding: 0.5rem 1rem; font-size: 1rem; margin: 0.5rem; }
        #output { margin-top: 1rem; padding: 1rem; border: 1px solid #ccc; min-height: 3rem; }
        #status { font-style: italic; color: #666; }
    </style>
</head>
<body>
    <h1>Voice Spike Test: Whisper.cpp STT + Piper TTS</h1>
    <div id="status">Initializing...</div>
    <button type="button" id="startBtn">Start Voice Test</button>
    <div id="output"></div>

    <script type="module">
        // We'll load the Whisper.cpp and Piper WASM modules
        // Note: In a real test, we would need to host the WASM files and models.
        // For this spike, we'll simulate by checking if the libraries are available via CDN or local files.
        // Since we don't have the WASM files yet, we'll use a placeholder and log what we would do.

        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');
        const startBtn = document.getElementById('startBtn');

        // Simulate loading models and checking availability
        async function initialize() {
            statusEl.textContent = 'Checking for Whisper.cpp and Piper availability...';
            await new Promise(r => setTimeout(r, 1000)); // simulate delay
            statusEl.textContent = 'Ready. Click "Start Voice Test" to begin.';
        }

        // Simulate processing voice command
        async function processVoiceCommand() {
            statusEl.textContent = 'Listening... (simulated)';
            outputEl.textContent = '';
            // Simulate audio capture and transcription
            await new Promise(r => setTimeout(r, 2000)); // simulate processing time
            const simulatedTranscription = "open dashboard"; // example command
            outputEl.textContent = `Transcribed: "${simulatedTranscription}"`;
            statusEl.textContent = 'Transcription complete. Now synthesizing response...';

            // Simulate TTS
            await new Promise(r => setTimeout(r, 1500)); // simulate TTS time
            statusEl.textContent = 'Playing response... (simulated)';
            // In reality, we would use Piper to synthesize and play audio.
            await new Promise(r => setTimeout(r, 1000)); // simulate audio playback
            statusEl.textContent = 'Test complete.';
        }

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            try {
                await processVoiceCommand();
            } finally {
                startBtn.disabled = false;
            }
        });

        // Initialize on load
        initialize();
    </script>
</body>
</html>
